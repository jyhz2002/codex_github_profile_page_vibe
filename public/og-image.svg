<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Open Graph placeholder</title>
  <desc id="desc">A bold abstract background with placeholder portfolio title.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#111620" />
      <stop offset="52%" stop-color="#0A1930" />
      <stop offset="100%" stop-color="#0A2C2C" />
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#FF7A5C" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FF7A5C" stop-opacity="0" />
