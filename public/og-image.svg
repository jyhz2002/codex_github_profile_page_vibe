    <radialGradient id="glowB" cx="85%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#FFB56B" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#FFB56B" stop-opacity="0" />
    </radialGradient>
