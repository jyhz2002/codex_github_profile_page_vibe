  <text x="110" y="250" fill="#FFB56B" font-family="Arial, sans-serif" font-size="22" letter-spacing="7">DEVELOPER PORTFOLIO</text>
  <text x="110" y="360" fill="#F7F4EF" font-family="Georgia, serif" font-size="88" font-weight="700">YOUR NAME</text>
